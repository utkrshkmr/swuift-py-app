name: Build SWUIFT desktop app

# Builds the SWUIFT app for:
#   - macOS arm64   (Apple Silicon)   -> .app + .dmg
#   - macOS x86_64  (Intel)           -> .app + .dmg
#   - Windows x64                     -> onedir + .exe + Inno Setup installer
#   - Windows ARM64                   -> onedir + .exe  (best-effort; some wheels may be missing)
#
# PyInstaller cannot cross-compile, so each target uses a matching runner.
# All four jobs run in parallel on every push / PR / manual dispatch, and
# their outputs are published as downloadable workflow artifacts.
#
# NOTE: this workflow expects the repository root to contain
#       `swuift_app.py`, `swuift_app.spec`, `requirements_app.txt`, the
#       `swuift/` package, etc.  Move the file and adjust working-directory
#       entries if the layout differs.

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ---------------------------------------------------------------------------
  # macOS arm64 (Apple Silicon)
  # ---------------------------------------------------------------------------
  macos-arm64:
    name: macOS arm64 (.app + .dmg)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: arm64

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_app.txt

      - name: Ensure SWUIFT.ico exists (spec references it on every platform)
        run: |
          if [ ! -f SWUIFT.ico ]; then
            python - <<'PY'
          from PIL import Image
          img = Image.open("SWUIFT.icns")
          img.save("SWUIFT.ico", format="ICO",
                   sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          PY
          fi

      - name: Build .app with PyInstaller
        run: |
          pyinstaller swuift_app.spec --noconfirm --clean
          ls -la dist

      - name: Create .dmg
        run: |
          STAGE=$(mktemp -d)
          cp -R "dist/SWUIFT.app" "$STAGE/"
          hdiutil create \
            -volname "SWUIFT" \
            -srcfolder "$STAGE" \
            -ov -format UDZO \
            "dist/SWUIFT_macOS_arm64.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: SWUIFT-macos-arm64
          path: |
            dist/SWUIFT.app
            dist/SWUIFT_macOS_arm64.dmg
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS x86_64 (Intel)
  # ---------------------------------------------------------------------------
  macos-x86_64:
    name: macOS x86_64 (.app + .dmg)
    runs-on: macos-13  # last GitHub-hosted Intel Mac runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: x64

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_app.txt

      - name: Ensure SWUIFT.ico exists
        run: |
          if [ ! -f SWUIFT.ico ]; then
            python - <<'PY'
          from PIL import Image
          img = Image.open("SWUIFT.icns")
          img.save("SWUIFT.ico", format="ICO",
                   sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          PY
          fi

      - name: Build .app with PyInstaller
        run: |
          pyinstaller swuift_app.spec --noconfirm --clean
          ls -la dist

      - name: Create .dmg
        run: |
          STAGE=$(mktemp -d)
          cp -R "dist/SWUIFT.app" "$STAGE/"
          hdiutil create \
            -volname "SWUIFT" \
            -srcfolder "$STAGE" \
            -ov -format UDZO \
            "dist/SWUIFT_macOS_x86_64.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: SWUIFT-macos-x86_64
          path: |
            dist/SWUIFT.app
            dist/SWUIFT_macOS_x86_64.dmg
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows x86_64
  # ---------------------------------------------------------------------------
  windows-x64:
    name: Windows x64 (.exe + Inno Setup installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: x64

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_app.txt

      - name: Ensure SWUIFT.ico exists
        shell: pwsh
        run: |
          if (-not (Test-Path "SWUIFT.ico")) {
            python -c "from PIL import Image; img=Image.open('SWUIFT.icns'); img.save('SWUIFT.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"
          }

      - name: Build .exe with PyInstaller
        shell: pwsh
        run: |
          pyinstaller swuift_app.spec --noconfirm --clean
          Get-ChildItem dist

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe" }
          & "$iscc" swuift_setup.iss

      - uses: actions/upload-artifact@v4
        with:
          name: SWUIFT-windows-x64
          path: |
            dist/SWUIFT/**
            dist/SWUIFT_Setup_*.exe
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows ARM64  (best-effort — some wheels may be missing)
  # ---------------------------------------------------------------------------
  windows-arm64:
    name: Windows ARM64 (.exe) [best-effort]
    runs-on: windows-11-arm
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: arm64

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_app.txt

      - name: Ensure SWUIFT.ico exists
        shell: pwsh
        run: |
          if (-not (Test-Path "SWUIFT.ico")) {
            python -c "from PIL import Image; img=Image.open('SWUIFT.icns'); img.save('SWUIFT.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"
          }

      - name: Build .exe with PyInstaller
        shell: pwsh
        run: |
          pyinstaller swuift_app.spec --noconfirm --clean
          Get-ChildItem dist

      - uses: actions/upload-artifact@v4
        with:
          name: SWUIFT-windows-arm64
          path: |
            dist/SWUIFT/**
          if-no-files-found: error
